name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for Cronus — traces conversations, LLM calls, and tool usage. Opt-in via `cronus plugins enable observability/langfuse` (or check the box in `cronus plugins`)."
author: NousResearch
requires_env:
  - CRONUS_LANGFUSE_PUBLIC_KEY
  - CRONUS_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
